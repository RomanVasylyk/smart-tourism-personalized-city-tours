services:
  db:
    image: postgis/postgis:16-3.4
    container_name: smart-tourism-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_tourism
      POSTGRES_USER: smart_tourism
      POSTGRES_PASSWORD: smart_tourism
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: smart-tourism-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://smart_tourism:smart_tourism@db:5432/smart_tourism
      ROUTING_ENABLED: "true"
      ROUTING_BASE_URL: http://routing:5000
      ROUTING_PROFILE: foot
      ROUTING_TIMEOUT_SECONDS: "0.75"
    ports:
      - "8000:8000"
    depends_on:
      - db

  routing:
    image: osrm/osrm-backend:latest
    container_name: smart-tourism-routing
    restart: unless-stopped
    command: osrm-routed --algorithm mld /data/slovakia-latest.osrm
    ports:
      - "5000:5000"
    volumes:
      - ./routing-data:/data:ro

volumes:
  postgres_data:
